# Netlify configuration for the IGA site.

[build]
  command = "npm run build"
  publish = "dist"

# ------------------------------------------------------------------
# PRE-LAUNCH ONLY: keep the imaginationgrove.netlify.app staging URL
# out of search engines while the site still has placeholder content.
# Without this, Google can index the netlify.app URL and it will
# compete with imaginationgroveacademy.com at launch.
#
# >>> REMOVE THIS ENTIRE [[headers]] BLOCK WHEN THE CUSTOM DOMAIN
# >>> GOES LIVE, or the real site will be invisible to Google too.
# ------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex"
